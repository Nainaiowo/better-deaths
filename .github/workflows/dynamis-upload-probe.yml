name: Dynamis Upload URL Probe

"on":
  workflow_dispatch:
    inputs:
      release_type:
        description: Release type to probe
        required: true
        type: choice
        default: latest
        options:
          - latest
          - testing
      version:
        description: Version number to probe
        required: true
        default: 0.1.0.191

permissions:
  contents: read

jobs:
  probe:
    runs-on: ubuntu-latest
    steps:
      - name: Probe presigned upload URL
        shell: bash
        env:
          PUBLISHER_KEY: ${{ secrets.PUBLISHER_KEY }}
          RELEASE_TYPE: ${{ inputs.release_type }}
          VERSION_NUM: ${{ inputs.version }}
        run: |
          set -euo pipefail

          if [ -z "${PUBLISHER_KEY:-}" ]; then
            echo "PUBLISHER_KEY secret is missing."
            exit 1
          fi

          response_file="$(mktemp)"
          endpoint="https://puni.sh/api/plugins/download/160/BetterDeaths/versions/${RELEASE_TYPE}?versionNum=${VERSION_NUM}&publisherKey=${PUBLISHER_KEY}"
          http_status="$(curl -sS -X PUT -o "${response_file}" -w "%{http_code}" "${endpoint}")"

          echo "Dynamis endpoint HTTP status: ${http_status}"
          if [[ "${http_status}" =~ ^2 ]]; then
            byte_count="$(wc -c < "${response_file}" | tr -d ' ')"
            echo "Presigned upload URL received (${byte_count} bytes). URL is intentionally not printed."
            node -e 'const fs = require("fs"); const value = fs.readFileSync(process.argv[1], "utf8").trim(); const url = new URL(value); console.log(`Upload host: ${url.hostname}`); console.log(`Upload path file: ${url.pathname.split("/").pop()}`); console.log(`Upload query parameters: ${Array.from(url.searchParams.keys()).length}`);' "${response_file}"
            exit 0
          fi

          echo "No presigned upload URL was returned."
          echo "Response body, redacted:"
          sed "s/${PUBLISHER_KEY}/***/g" "${response_file}" | head -c 1200
          echo
          exit 1
