name: Publish to Dynamis

"on":
  workflow_dispatch:
    inputs:
      release_type:
        description: Release type
        required: true
        type: choice
        default: testing
        options:
          - testing
          - latest

permissions:
  actions: write
  contents: read

jobs:
  publish:
    runs-on: ubuntu-latest
    env:
      DALAMUD_HOME: /tmp/dalamud
      DOTNET_CLI_TELEMETRY_OPTOUT: "1"
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set up .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: 10.0.x

      - name: Download Dalamud
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p "${DALAMUD_HOME}"
          curl -L https://goatcorp.github.io/dalamud-distrib/latest.zip -o "${RUNNER_TEMP}/dalamud.zip"
          unzip -q "${RUNNER_TEMP}/dalamud.zip" -d "${DALAMUD_HOME}"

      - name: Restore project
        run: dotnet restore BetterDeaths/BetterDeaths.csproj -p:EnableWindowsTargeting=true

      - name: Build project
        run: dotnet build --configuration Release --no-restore BetterDeaths/BetterDeaths.csproj -p:EnableWindowsTargeting=true

      - name: List build output
        run: find BetterDeaths/bin/Release -maxdepth 5 -type f | sort

      - name: Publish to Dynamis
        uses: PunishXIV/dynamis-action@v3.0.0
        with:
          plugin_id: "160"
          internal_name: BetterDeaths
          path: BetterDeaths/bin/Release/BetterDeaths/latest.zip
          type: ${{ inputs.release_type }}
        env:
          PUBLISHER_KEY: ${{ secrets.PUBLISHER_KEY }}
