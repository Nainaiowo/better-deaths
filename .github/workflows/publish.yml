name: Build & Publish to Dynamis

on:
  workflow_dispatch:
    inputs:
      release_type:
        description: Release type
        required: true
        type: choice
        default: testing
        options:
          - testing
          - latest

permissions:
  contents: write

jobs:
  build_publish:
    runs-on: ubuntu-latest
    env:
      DALAMUD_HOME: /tmp/dalamud
      DOTNET_CLI_TELEMETRY_OPTOUT: "1"
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set up .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: 10.0.x

      - name: Download Dalamud
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p "${DALAMUD_HOME}"
          curl -L https://goatcorp.github.io/dalamud-distrib/latest.zip -o "${RUNNER_TEMP}/dalamud.zip"
          unzip -q "${RUNNER_TEMP}/dalamud.zip" -d "${DALAMUD_HOME}"

      - name: Restore
        run: dotnet restore BetterDeaths/BetterDeaths.csproj -p:EnableWindowsTargeting=true

      - name: Build
        run: dotnet build --configuration Release --no-restore BetterDeaths/BetterDeaths.csproj -p:EnableWindowsTargeting=true

      - name: Read package metadata
        id: package
        shell: bash
        run: |
          set -euo pipefail
          zip_path="$(find BetterDeaths/bin/Release -path '*/latest.zip' -print -quit)"
          if [ -z "${zip_path}" ]; then
            echo "Could not find generated latest.zip."
            find BetterDeaths/bin/Release -maxdepth 5 -type f | sort
            exit 1
          fi

          notes_path="${RUNNER_TEMP}/better-deaths-release-notes.txt"
          metadata_path="${RUNNER_TEMP}/better-deaths-package-metadata.txt"
          python3 - "${zip_path}" "${notes_path}" "${{ inputs.release_type }}" > "${metadata_path}" <<'PY'
import json
import sys
import zipfile

zip_path, notes_path, release_type = sys.argv[1], sys.argv[2], sys.argv[3]
with zipfile.ZipFile(zip_path) as package:
    with package.open("BetterDeaths.json") as manifest_file:
        manifest = json.load(manifest_file)

version = manifest["AssemblyVersion"]
changelog = manifest.get("Changelog") or "Better Deaths update."
tag = f"v{version}-testing" if release_type == "testing" else f"v{version}"

with open(notes_path, "w", encoding="utf-8") as notes_file:
    notes_file.write(changelog)
    notes_file.write("\n")

print(f"zip_path={zip_path}")
print(f"version={version}")
print(f"tag={tag}")
print(f"release_notes_path={notes_path}")
PY
          cat "${metadata_path}" >> "${GITHUB_OUTPUT}"
          cat "${metadata_path}"

      - name: Publish to Dynamis
        uses: PunishXIV/dynamis-action@v3.0.0
        with:
          plugin_id: "160"
          internal_name: BetterDeaths
          path: ${{ steps.package.outputs.zip_path }}
          type: ${{ inputs.release_type }}
        env:
          PUBLISHER_KEY: ${{ secrets.PUBLISHER_KEY }}

      - name: Publish GitHub release
        uses: softprops/action-gh-release@v2
        with:
          name: ${{ steps.package.outputs.tag }}
          tag_name: ${{ steps.package.outputs.tag }}
          prerelease: ${{ inputs.release_type == 'testing' }}
          body_path: ${{ steps.package.outputs.release_notes_path }}
          files: ${{ steps.package.outputs.zip_path }}
